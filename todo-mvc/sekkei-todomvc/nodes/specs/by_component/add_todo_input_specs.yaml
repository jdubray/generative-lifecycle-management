id: kizo:web.todomvc.web_ui.add_todo_input.spec.prompt
stratum: spec
spec_kind: prompt
title: Add Todo Input — Generation Prompt
revision: { major: A, iteration: 0, status: in_review }
provenance: { derives_from: null, override_kind: net_new, authored_by: glm-sekkei-validator@A.0, authored_at: 2026-05-10T00:00:00Z }
body:
  context_bundle:
    - kizo:web.todomvc.web_ui                                       # input_placeholder param
    - kizo:web.todomvc.web_ui.add_todo_input
    - kizo:web.todomvc.web_ui.add_todo_input.spec.functional
    - kizo:web.todomvc.web_ui.add_todo_input.spec.technical
    - kizo:web.todomvc.web_ui.add_todo_input.spec.business_rule
    - kizo:web.todomvc.web_ui.add_todo_input.spec.acceptance
    - kizo:web.todomvc.web_ui.todo_pwa_shell.spec.schema           # selectors contract
    - kizo:web.todomvc.todo_management.todo_rest_api.spec.functional # POST /api/todos
  outputs:
    - path: public/js/add-todo-input.js
    - path: test/e2e/add-todo.spec.ts
  prompt_template: |
    Implement the add-todo input module. Default-export an init
    function that takes {store, render}. On Enter, follow the trim →
    validate → POST → push → clear → render flow described in
    spec.functional. Honor every rule in spec.business_rule.

    HARD CONSTRAINTS:
    - Do NOT clear the input on whitespace-only Enter.
    - Do NOT clear the input until 201 is received.
    - Skip Enter when isComposing (IME).
    - Disable the input across the network round-trip.
  verifier:
    command: "bunx playwright test test/e2e/add-todo.spec.ts"
    expect: "all tests pass; exit code 0"
