---
id: kizo:web.todomvc.web_ui.add_todo_input.spec.functional
stratum: spec
spec_kind: functional
title: Add Todo Input — Functional
revision: { major: A, iteration: 0, status: in_review }
provenance: { derives_from: null, override_kind: net_new, authored_by: glm-sekkei-validator@A.0, authored_at: 2026-05-10T00:00:00Z }
body:
  behaviors:
    - id: init
      signature: "init({ store, render }): void"
      description: |
        Locate input.new-todo. Attach a keydown listener filtering for
        the Enter key. Set placeholder = input_placeholder param.
    - id: handleEnter
      signature: "(event: KeyboardEvent): void  (when key === 'Enter')"
      description: |
        1. Take the input.value
        2. trim it
        3. if empty → preventDefault + return (no API call, no clear)
        4. POST /api/todos with { title }
        5. on 201: parse Todo, push into store.todos, clear the input, call render()
        6. on 4xx: leave the input alone, show an error banner via store.error
    - id: noOpOnOtherKeys
      description: "Any key other than Enter is allowed to flow through normally."
---
id: kizo:web.todomvc.web_ui.add_todo_input.spec.technical
stratum: spec
spec_kind: technical
title: Add Todo Input — Technical
revision: { major: A, iteration: 0, status: in_review }
provenance: { derives_from: null, override_kind: net_new, authored_by: glm-sekkei-validator@A.0, authored_at: 2026-05-10T00:00:00Z }
body:
  module: public/js/add-todo-input.js
  exports: "default function init({store, render})"
  selectors_owned: "input.new-todo"
  event_listener: "keydown on input.new-todo"
  http_call: |
    fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title })
    })
  ime_handling: |
    If event.isComposing OR event.keyCode === 229 → ignore the Enter
    (the user is mid-IME-composition). This prevents accidental submit
    in CJK input methods.
  loading_state: |
    Set input.disabled = true between dispatch and resolution to
    prevent double-submit. Re-enable in finally{}.
---
id: kizo:web.todomvc.web_ui.add_todo_input.spec.business_rule
stratum: spec
spec_kind: business_rule
title: Add Todo Input — Business Rules
revision: { major: A, iteration: 0, status: in_review }
provenance: { derives_from: null, override_kind: net_new, authored_by: glm-sekkei-validator@A.0, authored_at: 2026-05-10T00:00:00Z }
body:
  rules:
    - id: BR-INPUT-001
      rule: "Pressing Enter with whitespace-only input MUST NOT make a network call."
      enforcement: client trim BEFORE fetch
    - id: BR-INPUT-002
      rule: "Input MUST clear ONLY after the API responds 201."
      enforcement: clear inside the .then(); never clear unconditionally on Enter
    - id: BR-INPUT-003
      rule: "An IME composition Enter MUST be ignored."
      enforcement: check event.isComposing
    - id: BR-INPUT-004
      rule: "Input MUST be re-enabled even if the fetch throws."
      enforcement: try/finally
---
id: kizo:web.todomvc.web_ui.add_todo_input.spec.acceptance
stratum: spec
spec_kind: acceptance
title: Add Todo Input — Acceptance
revision: { major: A, iteration: 0, status: in_review }
provenance: { derives_from: null, override_kind: net_new, authored_by: glm-sekkei-validator@A.0, authored_at: 2026-05-10T00:00:00Z }
body:
  deliverables:
    - kind: test_file
      path: test/e2e/add-todo.spec.ts
      framework: playwright
      cases:
        - "Type 'buy milk', press Enter → an <li> appears with text 'buy milk', input is cleared"
        - "Type only spaces, press Enter → no <li> appears, input keeps the spaces"
        - "Type 'a', press Enter, type 'b', press Enter → two <li>s in order [a, b]"
        - "Network error case (server unreachable) → input is NOT cleared, error banner appears"
        - "Mock IME: dispatch keydown with isComposing=true → no fetch is made"
  runtime_invariants:
    - "Number of POST /api/todos calls === number of non-empty Enters"
    - "Input.disabled is false at any moment when the user is not actively waiting on a request"
  verifier:
    command: "bunx playwright test test/e2e/add-todo.spec.ts"
    expect: "all tests pass; exit code 0"
