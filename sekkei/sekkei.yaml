body:
  system_role: root
  dbom_ref: null
  realization_summary: |
    Single Bun process. One Hono app factory (src/server/app.ts) wires all
    middleware and /api/v1 routes; src/server/server.ts is the bootstrap
    that reads PORT + SESSION_SECRET, opens the SQLite database via
    src/repository/db.ts, and calls Bun.serve. There is NO engine/workbench
    split: workbench routes, regeneration pipeline, verifier, websockets,
    and the git service all share the same RuntimeDeps container
    (src/server/deps.ts) and the same SQLite handle.

    Collaboration is WebSocket-based (Bun ServerWebSocket + an in-process
    EventBus in src/ws/), not SSE. The PWA is served as ES modules from
    /public by src/server/routes/static.ts with a service worker.

    LLM dispatch uses src/generation/llm-client.ts (Fake + Anthropic
    Messages API). Content-addressed artifact caching uses
    src/generation/cache.ts. Attestations are in-toto Statement v1 + DSSE
    envelope built by src/generation/attestation.ts.
  acceptance_gate: |
    Regenerating this sekkei into a working GLM must produce a system that:
      1. Boots on `bun run src/server/server.ts` and serves the workbench
         + /api/v1 at http://localhost:${PORT}.
      2. Authors nodes against specification/sekkei.schema.json with
         soft-lock contention surfacing as HTTP 423, and live WebSocket
         fan-out of node.changed events.
      3. Implements the realized GLM processes — SCR FSM, variant
         resolution + sekkei.lock, drift classification + auto-heal,
         reuse 4-stage promotion, in-toto/DSSE provenance, 7-gate
         verifier, Vibe Mode scripted scenarios, and ECN git commits.
      4. Successfully regenerates the BaanBaan and TodoMVC example
         sekkeis end-to-end with all 7 verifier gates passing.
      5. Carries an in-toto attestation linking every generated artifact
         back to its sekkei commit + sekkei.lock content hash + generator
         identity, persistable as NDJSON via /provenance export.
      6. Passes every spec.acceptance.deliverables[].verifier across all
         Components (gates 5 + 6 of verify_sekkei.py).
