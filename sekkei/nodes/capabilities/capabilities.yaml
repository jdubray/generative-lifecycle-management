id: kizo:dev.glm.generation
stratum: capability
title: Generation Pipeline
description: |
  The LLM-backed regeneration surface. Pipeline orchestration computes a
  cache key, probes the artifact cache, on miss invokes the LLM client,
  computes the artifact digest, builds the in-toto Statement + DSSE
  envelope, and persists rows into provenance_events +
  generation_attestations.

  LLM client is pluggable: FakeLlmClient for deterministic tests,
  AnthropicLlmClient for the Messages API (default model
  claude-sonnet-4-6, cache_control:ephemeral on prompt prefix). The
  artifact cache has two backends: in-memory and a filesystem store
  with atomic writes under `<prefix>/<rest>/<safe-filename>`. A simple
  in-process FIFO queue caps concurrency.

