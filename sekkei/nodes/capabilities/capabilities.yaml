id: kizo:dev.glm.authoring
stratum: capability
title: Sekkei Authoring
description: |
  Node CRUD, structural body validation, where-used traversal, and the CEL
  expression evaluator used by variant resolution. Every write goes through
  the node repository which canonicalizes the body and writes
  `sha256:<hex>` into content_hash; reads re-verify and raise
  ContentHashMismatchError if drift is detected.

  validateBody() enforces stratum-aware body shape (system/capability/
  component/interaction with its contract discriminator/spec). The
  where-used module returns direct + transitive consumers via upward BFS
  over composes-of edges, used both by the routes and by reuse candidate
  scanning. The CEL evaluator is a small home-grown tokenizer + parser
  that supports comparisons, logical operators, `in`, dot-access
  identifiers, list literals, and a `.length` accessor on strings/arrays;
  it is consumed exclusively by the variant resolver's constraint step.

