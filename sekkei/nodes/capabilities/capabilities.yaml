id: kizo:dev.glm.runtime
stratum: capability
title: Runtime & Middleware
description: |
  Bun.serve bootstrap, Hono app factory, the DI container that all
  middleware/routes read through, and the cross-cutting middleware:
  context, error, rate-limit, security-headers.

  server.ts reads PORT + SESSION_SECRET, opens the DB, calls createApp,
  and listens. app.ts wires the middleware stack and all /api/v1 route
  groups in order. deps.ts exposes RuntimeDeps / Repositories /
  AppDeps + buildRepositories(db). errorHandler maps
  UnauthorizedError→401, ForbiddenError→403, NodeBodyValidationError→422,
  InvalidScrTransitionError→409, ContentHashMismatchError→500.
  rateLimit is an in-process token bucket (60 capacity, 10 refill/sec).
  securityHeaders sets a strict CSP, X-Frame-Options:DENY, HSTS-on-HTTPS.

