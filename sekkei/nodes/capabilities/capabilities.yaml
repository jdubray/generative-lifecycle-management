id: kizo:dev.glm.variant_resolution
stratum: capability
title: Variant Resolution
description: |
  The six-step closure → bind → constrain → external-deps → cache-key →
  sekkei.lock pipeline. resolve() walks composes-of + derives-from to
  build the closure, applies parameter defaults + bindings (reporting
  missing), validates every constraint via the CEL evaluator, collects
  external dependencies, computes the cache_key hash from closure /
  binding / design / generator / generation hashes, and emits a
  sekkei.lock file pinning (id, major, content_hash) per node.

  Variant and VariantRollout rows live in their own repository. Rollout
  has a strict stage order — Released → Available-on-Channel →
  Pinned-by-Variant → Generated-for-Instance → Deployed-to-dBOM — and
  AC-20 refuses advance when pinRev === availableRev.

