id: kizo:dev.glm.collaboration
stratum: capability
title: Real-time Collaboration
description: |
  Soft-locks on individual nodes, append-only change log, in-process
  workspace event bus, and the Bun ServerWebSocket fan-out to connected
  clients. Soft-locks live in the edit_locks table keyed by (node_id,
  user_id) with a 30-second route-level TTL; HTTP 423 LOCKED is returned
  on contention.

  The change_log table records node mutations with monotonic timestamps;
  it powers both the dashboard activity feed and the WebSocket replay
  endpoint. EventBus is per-workspace, in-process pub/sub with eleven
  typed event variants. workspace-socket handles the WS welcome,
  subscribe, ping/pong, and `replay { since }` messages.

