id: kizo:dev.glm.distribution
stratum: capability
title: Distribution (PWA Shell + Static Serving)
description: |
  Static-asset serving for the PWA shell. static_routes mounts /,
  /login, /manifest.json, /sw.js (with Service-Worker-Allowed: /), and
  /public/* with path-traversal blocked.

  The PWA shell itself is a vanilla-JS bundle with no build step: an
  api client, observable store, hash router, WS client, soft-lock
  helper, offline write queue, and a top-level app boot. Ten view
  modules (dashboard, change-management, drift, effectivity, provenance,
  reuse, sekkei-browser, variants, vibe-mode, where-used) sit alongside
  ten UI atoms (class-badge, diff-block, empty, hash, index, kv, section,
  status-pill, stratum-tag, yaml-block). A service worker provides
  read-through cache for offline read.

