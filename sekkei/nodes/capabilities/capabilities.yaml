id: kizo:dev.glm.change_management
stratum: capability
title: Change Management (SCR)
description: |
  Sekkei Change Requests — first-class entities with an 8-state FSM, a
  paired approvals table, and a per-workspace promise-chain mutex that
  serializes the transition from Approved to Implemented. SCRs have two
  classes: Class I (contract change, requires platform-review approval)
  and Class II (internal, solo-dev approval).

  An SCR body carries `problem`, a typed `diffYaml` (lines tagged
  context/add/remove/change), `targetNodes` (glm: ids), an `effectivity`,
  an `impact { variantsAffected, tokensEst, cacheMissCount }`, and an
  optional `returnReason`. On the `implement` event, scr_implementer
  writes affected nodes' YAML to disk and creates a single ECN commit
  via the git capability (signed when Class I and GLM_SIGN_COMMITS=true).

