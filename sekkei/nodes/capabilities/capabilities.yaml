id: kizo:dev.glm.reuse_management
stratum: capability
title: Reuse Management
description: |
  Identifies reuse candidates from the where-used graph and walks them
  through a 4-stage promotion path. Stage order: Variant-Local →
  Candidate-for-Promotion → Promoted-to-Library → Stewarded-by-Owner.

  POST /reuse/find-candidates scans the graph (AC-28): anything with ≥2
  direct dependents becomes a Variant-Local row. PUT /reuse/:rid/stage
  advances one stage at a time; promotion past Candidate-for-Promotion
  requires a steward (AC-30).

