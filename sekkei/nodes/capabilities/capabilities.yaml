id: kizo:dev.glm.git
stratum: capability
title: Git Integration
description: |
  Typed wrapper around the git CLI, plus all sekkei-specific git pieces:
  notes manager, hook installer, ECN commit grammar, YAML node store,
  and the per-workspace promise-chain mutex inside sekkei-git-service
  that turns approved + implemented SCRs into ECN commits.

  GitClient spawns the git CLI via child_process.spawnSync and exposes
  init/config/add/commit (message via stdin)/show/log/rev-parse/branch/
  checkout/tag/status-porcelain with typed errors. The YAML store writes
  one file per node at nodes/<stratum>/<safe-glm-id>.yaml (`:` → `__`)
  and verifies content_hash on read. ECN commit messages follow the
  ECN: / Affected: / Why: / Regen required: / SCR: / Signed-off-by:
  layout. Hooks installs pre-commit (verify_sekkei.py + null-byte) and
  pre-receive (Affected: block + 6-gate verifier when GLM_DB_PATH +
  GLM_WORKSPACE set) scripts.

