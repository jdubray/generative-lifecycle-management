id: kizo:dev.glm.observability
stratum: capability
title: Observability
description: |
  Structured per-request logging (with X-Request-Id) and the append-only
  audit_events feed. Logging is suppressed under NODE_ENV=test and
  skipped for static paths. The audit repository exposes append /
  listByWorkspace / listByType and is written by the verifier runner,
  the drift waiver flow, and other side-effectful operations.

