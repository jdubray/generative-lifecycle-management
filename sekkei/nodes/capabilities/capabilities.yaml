id: kizo:dev.glm.drift_reconciliation
stratum: capability
title: Drift Reconciliation
description: |
  Detects, classifies, and resolves drift between the sekkei's intended
  hashes and what is actually running. classify() is a pure function
  returning (status, kind, policy, shouldAutoHeal, detail).

  Drift status values are Synced, Hash-Drifted, Live-Drifted, Suspended;
  kinds are none, hash, live_state; policies are auto-heal, alert,
  suspend. Routes expose list, sweep, resolve (heal | suspend | waiver |
  scr; AC-26 waiver requires positive durationDays), and auto-heal
  (AC-24, restricted to live-state drift on auto-heal-policy nodes).

