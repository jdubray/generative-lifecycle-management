id: kizo:dev.glm.provenance
stratum: capability
title: Provenance & Attestation
description: |
  Builds and stores in-toto Statement v1 + DSSE envelope attestations
  linking generated artifacts to their sekkei.lock + generator identity.
  attestation_builder owns the producer side: HmacSigner (dev key, with
  Ed25519 planned), buildStatement, buildDsseEnvelope, verifyDsseEnvelope,
  decodeStatement, deterministic rekorEntryId/rekorUrl.

  The provenance and attestation repositories own the store side. Routes
  expose list, get, NDJSON export (AC-34), and server-side
  re-verification (AC-35) of every persisted envelope.

