id: kizo:dev.glm.verification
stratum: capability
title: Sekkei Verification
description: |
  The 7-gate pure-function verifier — 1.envelope, 2.stratum_hierarchy,
  2.b.role_consistency (system_role discriminator added with v1.1.9),
  3.closure_completeness, 4.brief_coverage, 5.spec_coverage,
  6.spec_quality. Pure inputs/outputs, no I/O.

  runner loads nodes from the repository, runs gates, persists
  verification_runs, appends an audit `verifier.run` event, and publishes
  generation.complete on the EventBus. Routes expose POST
  /workspaces/:id/verify, GET /verifier/runs, GET /verifier/runs/latest,
  GET /verifier/runs/:id.

