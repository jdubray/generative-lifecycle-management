id: kizo:dev.glm.identity
stratum: capability
title: Identity & Access
description: |
  Authentication and authorization for users, sessions, API tokens, and the
  per-workspace RBAC layer. Sessions are HMAC-signed cookies (7-day TTL).
  API tokens are issued in the form `glm_<prefix-8>_<random-32hex>` and
  stored as salted sha256 hashes with constant-time compare on validation.
  RBAC has two tiers: organization-level UserRole and workspace-scoped
  WorkspaceMemberRole; gate helpers throw ForbiddenError.

  The auth middleware identifies callers in this order: Bearer API token,
  then session cookie, then the test-only `x-test-user-id` header. The
  auth routes expose passwordless dev login at /auth/login plus /logout
  and /me. Workspace routes (/workspaces, /workspaces/:id,
  /workspaces/:id/summary) live under the same Capability because the
  workspace membership table is the principal RBAC scope.

