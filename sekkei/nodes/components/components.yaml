id: kizo:dev.glm.identity.api_token
stratum: component
title: API Token Issuer / Validator
description: |
  Issues + validates API tokens of the form `glm_<prefix-8>_<random-32hex>`.
  Tokens are stored as sha256 hashes with per-token salt; validation uses
  constant-time compare and consults findCandidatesByPrefix on the
  repository. readBearer parses the Authorization header.
revision: { major: A, iteration: 1, status: in_review }
provenance:
  derives_from: null
  override_kind: net_new
  authored_by: glm-reverse-engineer@A.1
  authored_at: 2026-05-11T00:00:00Z
body:
  boundary: "Owns: token format, hash, validation. Does NOT own: storage (delegates to api_token_repository)."
  runtime: in_process
  runtime_note: "pure (no I/O beyond the repository call)"
  realization_file: src/auth/api-token.ts
---
